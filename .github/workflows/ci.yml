name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "9"

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm run typecheck
      - name: Lint nextjs-app
        run: pnpm --filter @workspace/nextjs-app run lint
        continue-on-error: false

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: EPIC 17 unit tests
        run: pnpm run test:unit

  dod-gate:
    name: Definition of Done
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Verify DoD tooling
        run: |
          test -f docs/DEFINITION_OF_DONE.md
          test -f .github/pull_request_template.md
          test -f .cursor/rules/definition-of-done.mdc
          test -f scripts/verify-dod.mjs
          test -f AGENTS.md
      - name: DoD script smoke (all-pass fixture)
        run: |
          FIXTURE=$(mktemp)
          cat > "$FIXTURE" <<'EOF'
          # DoD status
          ticket: CI-SMOKE
          title: smoke
          ## checklist
          feature_implementation: pass
          code_quality: pass
          testing_happy_and_failure: pass
          api_contracts_openapi: n/a
          ui_responsive_a11y: n/a
          rbac_security: pass
          state_handling: n/a
          validation_fe_be: pass
          functional_manual: pass
          code_review: pass
          staging_verification: n/a
          backward_compatibility: pass
          performance: pass
          logging_auditing: n/a
          documentation: pass
          ## outstanding
          - none
          EOF
          # strip leading spaces from heredoc indent
          sed -i 's/^          //' "$FIXTURE"
          node ./scripts/verify-dod.mjs --path "$FIXTURE"
      - name: Require DoD section in PR body
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$PR_BODY" ]; then
            echo "PR body is empty — fill .github/pull_request_template.md"
            exit 1
          fi
          echo "$PR_BODY" | grep -qi "Definition of Done" || {
            echo "PR body must include a Definition of Done section"
            exit 1
          }
          echo "$PR_BODY" | grep -Eqi "(happy.path|Happy.path|happy path)" || {
            echo "PR body must mention happy-path testing"
            exit 1
          }
          echo "DoD PR body section present"

  build:
    name: Build
    needs: [lint-typecheck, unit-tests, dod-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build api-server
        run: pnpm --filter @workspace/api-server run build
        env:
          NODE_ENV: production
      - name: Build nextjs-app
        run: pnpm --filter @workspace/nextjs-app run build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          SESSION_SECRET: ci-session-secret-not-for-production
          NEXT_TELEMETRY_DISABLED: "1"
      - name: Upload api-server artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-server-dist
          path: artifacts/api-server/dist
          retention-days: 7

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block committed secrets
        run: |
          if git ls-files | grep -E '(^\.env$|\.env\.local$|credentials\.json$|id_rsa$)'; then
            echo "Secret-like files must not be committed"
            exit 1
          fi
          echo "No obvious secret files in tree"
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Audit (warn)
        run: pnpm audit --prod --audit-level=high || true

  migrate-check:
    name: Migration SQL Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify EPIC 17 migration present
        run: |
          test -f lib/db/migrations/0017_epic17_infrastructure.sql
          test -f lib/db/migrations/0017_epic17_infrastructure.down.sql
          test -f lib/db/src/migrate.ts
          test -f lib/db/src/seed.ts
          echo "Migration artifacts OK"

  deploy-staging:
    name: Deploy Staging
    needs: [build, security, migrate-check]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Staging deploy placeholder
        run: |
          echo "Automatic staging deploy hook."
          echo "Configure STAGING_DEPLOY_WEBHOOK / Railway / Vercel project secrets in GitHub Environments."
          echo "Never commit credentials. Use GitHub Secrets for DATABASE_URL, SESSION_SECRET, etc."
        env:
          STAGING_DEPLOY_WEBHOOK: ${{ secrets.STAGING_DEPLOY_WEBHOOK }}

  deploy-production:
    name: Deploy Production (approval)
    needs: [build, security, migrate-check]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Production deploy (manual approval gate)
        run: |
          echo "Production deploy requires GitHub Environment 'production' reviewers."
          echo "Documented steps: pnpm --filter @workspace/db migrate && pnpm --filter @workspace/db seed"
          echo "Then deploy api-server + nextjs-app with production secrets."
